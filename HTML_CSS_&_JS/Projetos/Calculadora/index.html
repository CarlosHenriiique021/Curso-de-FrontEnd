<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <!-- Import das fontes do Google - Uso da 'Inter' para legibilidade e visual moderno -->
    <!-- A fonte Inter é escolhida por seu design neutro e excelente legibilidade em números -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Container principal (Card) com efeito Glassmorphism (vidro fosco) -->
    <!-- O design utiliza desfoque e transparência para simular um painel moderno de vidro -->
    <div class ="calculator-card">
        
        <!-- Visor da calculadora: Área de saída de dados (Output) -->
        <!-- O container é dividido para fornecer feedback da conta atual e do histórico recente -->
        <div class="display-container">
            <!-- history: Registro da operação anterior para conferência do usuário -->
            <!-- Funciona como uma 'memória de rastro', mostrando o que foi digitado antes do '=' -->
            <div id="history"></div>
            <!-- display: Área principal que mostra o número sendo digitado ou o resultado final -->
            <!-- Possui id para manipulação direta via DOM no JavaScript -->
            <div id="display">0</div>
        </div>

        <!-- Teclado (Grid): Organizado em 4 colunas com operadores à direita -->
        <!-- O layout de 4 colunas é o padrão da indústria para calculadoras científicas e mobile -->
        <div class="buttons-grid">
            
            <!-- Linha 1: Funções de Controle e Operadores de Divisão/Multiplicação -->
            <!-- AC limpa todo o estado, enquanto DEL remove o último caractere inserido -->
            <button onclick="clearDisplay()" class="btn btn-clear">AC</button>
            <button onclick="deleteDigit()" class="btn btn-del">DEL</button>
            <button onclick="appendOperator('/')" class="btn btn-operator">/</button>
            <button onclick="appendOperator('*')" class="btn btn-operator">×</button>

            <!-- Linha 2: Bloco numérico superior e Operador de Subtração -->
            <!-- Cada botão numérico invoca a função appendNumber passando seu valor como string -->
            <button onclick="appendNumber('7')" class="btn">7</button>
            <button onclick="appendNumber('8')" class="btn">8</button>
            <button onclick="appendNumber('9')" class="btn">9</button>
            <button onclick="appendOperator('-')" class="btn btn-operator">-</button>

            <!-- Linha 3: Bloco numérico central e Operador de Adição -->
            <!-- O posicionamento centralizado facilita o alcance dos números mais usados -->
            <button onclick="appendNumber('4')" class="btn">4</button>
            <button onclick="appendNumber('5')" class="btn">5</button>
            <button onclick="appendNumber('6')" class="btn">6</button>
            <button onclick="appendOperator('+')" class="btn btn-operator">+</button>

            <!-- Linha 4: Bloco numérico inferior e Botão de Execução (Igual) -->
            <!-- O botão de igual é estilizado com cores de destaque (CTA - Call to Action) -->
            <button onclick="appendNumber('1')" class="btn">1</button>
            <button onclick="appendNumber('2')" class="btn">2</button>
            <button onclick="appendNumber('3')" class="btn">3</button>
            <button onclick="calculate()" class="btn btn-equal">=</button>

            <!-- Linha 5: Base da calculadora (Zero e Ponto Decimal) -->
            <!-- btn-zero utiliza span de colunas no CSS para ocupar um espaço maior, facilitando o toque -->
            <button onclick="appendNumber('0')" class="btn btn-zero">0</button>
            <button onclick="appendNumber('.')" class="btn">.</button>
        </div>
    </div>
    <!-- Script vinculado ao final para garantir que o DOM esteja carregado antes da execução lógica -->
    <script src="./script.js"></script>
</body>
</html>
